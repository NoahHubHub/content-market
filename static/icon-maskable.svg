  <rect x="216" y="357" width="4" height="22" rx="2" fill="#A35139" opacity="0.7"/>
  <rect x="270" y="198" width="34" height="140" rx="7" fill="#4CAF82" opacity="0.9"/>
  <rect x="286" y="166" width="4" height="32" rx="2" fill="#4CAF82" opacity="0.7"/>
  <rect x="286" y="338" width="4" height="20" rx="2" fill="#4CAF82" opacity="0.7"/>
  <rect x="340" y="228" width="34" height="94" rx="7" fill="#FFB162" opacity="0.95"/>
