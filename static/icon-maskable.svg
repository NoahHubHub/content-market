<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Maskable: safe zone is inner 80% (410x410 centered), so content must be within ~50px inset -->
  <defs>
    <radialGradient id="bg" cx="30%" cy="20%" r="80%">
      <stop offset="0%" stop-color="#2C3B4D"/>
      <stop offset="100%" stop-color="#1B2632"/>
    </radialGradient>
  </defs>
  <!-- Full bleed background (no rounded corners for maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Content inside safe zone (51px inset on each side) -->
