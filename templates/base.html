<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Content Market{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    body { background: #0d1117; color: #e6edf3; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .navbar { background: #161b22 !important; border-bottom: 1px solid #30363d; }
    .navbar-brand { font-weight: 700; font-size: 1.2rem; }
    .card { background: #161b22; border: 1px solid #30363d; color: #e6edf3; }
    .card:hover { border-color: #58a6ff; transition: border-color 0.15s; }
    .table { color: #e6edf3; }
    .form-control, .form-select {
      background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
    }
    .form-control:focus, .form-select:focus {
      background: #0d1117; color: #e6edf3;
      border-color: #58a6ff; box-shadow: 0 0 0 3px rgba(88,166,255,.2);
    }
    .btn-buy  { background: #238636; border-color: #238636; color: #fff; }
    .btn-buy:hover  { background: #2ea043; border-color: #2ea043; color: #fff; }
    .btn-sell { background: #da3633; border-color: #da3633; color: #fff; }
    .btn-sell:hover { background: #f85149; color: #fff; }
    .price-up   { color: #3fb950; }
    .price-down { color: #f85149; }
    .price-neutral { color: #8b949e; }
    a { color: #58a6ff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .badge-extreme { background: #da3633 !important; }
    .badge-high    { background: #d29922 !important; color: #000 !important; }
    .badge-medium  { background: #1f6feb !important; }
    .badge-low     { background: #238636 !important; }
    hr { border-color: #30363d; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-expand-lg mb-4">
  <div class="container">
    <a class="navbar-brand" href="/">📈 Content Market</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navmenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navmenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-bar-chart-line"></i> Markt</a></li>
        <li class="nav-item"><a class="nav-link" href="/search"><i class="bi bi-search"></i> Suchen</a></li>
        <li class="nav-item"><a class="nav-link" href="/leaderboard"><i class="bi bi-trophy"></i> Leaderboard</a></li>
      </ul>
      {% if user %}
      <ul class="navbar-nav align-items-center gap-2">
        <li class="nav-item">
          <a class="nav-link" href="/portfolio"><i class="bi bi-briefcase"></i> Portfolio</a>
        </li>
        <li class="nav-item">
          <span class="nav-link fw-bold text-warning">
            💰 ${{ "%.2f"|format(user.balance) }}
          </span>
        </li>
        <li class="nav-item">
          <a class="nav-link text-secondary" href="/logout"><i class="bi bi-box-arrow-right"></i> {{ user.username }}</a>
        </li>
      </ul>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
