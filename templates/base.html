<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Content Market{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    * { -webkit-font-smoothing: antialiased; }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    /* ── Navbar ───────────────────────────────────────── */
    .tr-nav {
      background: #000;
      padding: 16px 0 8px;
      border-bottom: 1px solid #111;
      position: sticky; top: 0; z-index: 100;
    }
    .tr-nav-inner {
      max-width: 540px; margin: 0 auto; padding: 0 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .tr-nav-brand {
      font-size: 1rem; font-weight: 700; color: #fff; text-decoration: none;
      letter-spacing: -.01em;
    }
    .tr-nav-links { display: flex; gap: 20px; align-items: center; }
    .tr-nav-links a {
      font-size: .85rem; color: #555; text-decoration: none; font-weight: 500;
      transition: color .15s;
    }
    .tr-nav-links a:hover, .tr-nav-links a.active { color: #fff; }
    .tr-nav-balance {
      font-size: .85rem; font-weight: 600; color: #fff;
    }
    .tr-nav-badge {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 17px; height: 17px; padding: 0 4px;
      background: #30d158; color: #000; border-radius: 20px;
      font-size: .65rem; font-weight: 800; margin-left: 4px;
      vertical-align: middle; line-height: 1;
    }

    /* ── Page wrapper ─────────────────────────────────── */
    .tr-page {
      max-width: 540px; margin: 0 auto; padding: 28px 20px 80px;
    }

    /* ── Typography ───────────────────────────────────── */
    .tr-label  { font-size: .75rem; color: #555; letter-spacing: .04em; text-transform: uppercase; }
    .tr-title  { font-size: 1.5rem; font-weight: 700; color: #fff; margin: 0; }
    .tr-sub    { font-size: .85rem; color: #555; }
    .tr-up     { color: #30d158; }
    .tr-down   { color: #ff453a; }

    /* ── Section header ───────────────────────────────── */
    .tr-section {
      display: flex; justify-content: space-between; align-items: center;
      margin: 36px 0 8px;
    }
    .tr-section h2 { font-size: 1.1rem; font-weight: 700; color: #fff; margin: 0; }
    .tr-section span { font-size: .82rem; color: #555; }

    /* ── List rows ────────────────────────────────────── */
    .tr-row {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 0; border-bottom: 1px solid #111;
      text-decoration: none; color: inherit;
    }
    .tr-row:last-child { border-bottom: none; }
    .tr-row:hover .tr-row-title { color: #ccc; }
    .tr-row-icon {
      width: 46px; height: 46px; border-radius: 10px;
      object-fit: cover; flex-shrink: 0; background: #111;
    }
    .tr-row-icon-placeholder {
      width: 46px; height: 46px; border-radius: 10px;
      background: #111; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .tr-row-body { flex: 1; min-width: 0; }
    .tr-row-title {
      font-size: .9rem; font-weight: 600; color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: color .15s;
    }
    .tr-row-sub { font-size: .78rem; color: #555; margin-top: 2px; }
    .tr-row-right { text-align: right; flex-shrink: 0; }
    .tr-row-price { font-size: .95rem; font-weight: 600; color: #fff; }
    .tr-row-pnl   { font-size: .78rem; font-weight: 500; margin-top: 2px; }

    /* ── Risk badges ──────────────────────────────────── */
    .tr-risk {
      font-size: .7rem; font-weight: 700; padding: 2px 7px;
      border-radius: 20px; letter-spacing: .03em;
    }
    .tr-risk-danger  { background: rgba(255,69,58,.15);  color: #ff453a; }
    .tr-risk-warning { background: rgba(255,159,10,.15); color: #ff9f0a; }
    .tr-risk-info    { background: rgba(10,132,255,.15); color: #0a84ff; }
    .tr-risk-success { background: rgba(48,209,88,.15);  color: #30d158; }

    /* ── Inputs ───────────────────────────────────────── */
    .tr-input {
      width: 100%; background: #111; border: none; border-radius: 12px;
      padding: 14px 16px; color: #fff; font-size: 1rem; outline: none;
    }
    .tr-input::placeholder { color: #444; }
    .tr-input:focus { background: #1a1a1a; }

    /* ── Buttons ──────────────────────────────────────── */
    .tr-btn-primary {
      background: #fff; color: #000; border: none; border-radius: 14px;
      padding: 15px 24px; font-size: .95rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: background .15s;
    }
    .tr-btn-primary:hover { background: #ddd; color: #000; }

    .tr-btn-buy {
      background: #30d158; color: #000; border: none; border-radius: 14px;
      padding: 15px 24px; font-size: .95rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      width: 100%; text-align: center; transition: background .15s;
    }
    .tr-btn-buy:hover { background: #2ebd50; color: #000; }

    .tr-btn-sell {
      background: #ff453a; color: #fff; border: none; border-radius: 14px;
      padding: 15px 24px; font-size: .95rem; font-weight: 700;
      cursor: pointer; text-decoration: none; display: inline-block;
      width: 100%; text-align: center; transition: background .15s;
    }
    .tr-btn-sell:hover { background: #e03e34; color: #fff; }

    .tr-btn-ghost {
      background: #111; color: #fff; border: none; border-radius: 14px;
      padding: 15px 24px; font-size: .95rem; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-block;
      transition: background .15s;
    }
    .tr-btn-ghost:hover { background: #1a1a1a; color: #fff; }

    /* ── Action bar (bottom) ──────────────────────────── */
    .tr-actions {
      display: flex; gap: 12px; margin-top: 40px;
    }
    .tr-actions .tr-btn-primary,
    .tr-actions .tr-btn-ghost {
      flex: 1; display: flex; align-items: center;
      justify-content: space-between; padding: 16px 20px;
    }

    /* ── Divider ──────────────────────────────────────── */
    .tr-divider { border: none; border-top: 1px solid #111; margin: 0; }

    /* ── Alert pills ──────────────────────────────────── */
    .tr-alert {
      border-radius: 12px; padding: 12px 16px;
      font-size: .85rem; font-weight: 500; margin-bottom: 20px;
    }
    .tr-alert-success { background: rgba(48,209,88,.12); color: #30d158; }
    .tr-alert-error   { background: rgba(255,69,58,.12); color: #ff453a; }
    .tr-alert-info    { background: rgba(10,132,255,.12); color: #0a84ff; }

    /* ── Avatar ───────────────────────────────────────── */
    .tr-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: #222;
      display: flex; align-items: center; justify-content: center;
      font-size: .8rem; font-weight: 700; color: #fff; position: relative;
      flex-shrink: 0;
    }
    .tr-avatar-dot {
      position: absolute; top: 1px; right: 1px; width: 8px; height: 8px;
      background: #0a84ff; border-radius: 50%; border: 2px solid #000;
    }

    /* ── Time range tabs ──────────────────────────────── */
    .tr-timerange {
      display: flex; gap: 0; border-bottom: 1px solid #111; margin-bottom: 0;
    }
    .tr-tr-btn {
      background: none; border: none; color: #555; font-size: .82rem;
      font-weight: 600; padding: 6px 14px 10px; cursor: pointer; position: relative;
    }
    .tr-tr-btn.active { color: #fff; }
    .tr-tr-btn.active::after {
      content: ""; position: absolute; bottom: -1px; left: 14px; right: 14px;
      height: 2px; background: #fff; border-radius: 2px;
    }

    /* ── Overrides ────────────────────────────────────── */
    a { color: #fff; text-decoration: none; }
    a:hover { color: #ccc; }
    ::selection { background: rgba(255,255,255,.15); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }
  </style>
</head>
<body>

<nav class="tr-nav">
  <div class="tr-nav-inner">
    <a href="/" class="tr-nav-brand">Content Market</a>
    <div class="tr-nav-links">
      <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Markt</a>
      <a href="/search" class="{% if request.url.path == '/search' %}active{% endif %}">Suche</a>
      <a href="/leaderboard" class="{% if request.url.path == '/leaderboard' %}active{% endif %}">Rangliste</a>
      <a href="/portfolio" class="{% if request.url.path == '/portfolio' %}active{% endif %}">
        Portfolio{% if user and user.holdings_count > 0 %}<span class="tr-nav-badge">{{ user.holdings_count }}</span>{% endif %}
      </a>
      {% if user %}
      <span class="tr-nav-balance" title="Cash · {{ user.holdings_count }} Positionen">${{ "%.0f"|format(user.balance) }}</span>
      <form method="post" action="/logout" style="margin:0;">
        <button type="submit"
          style="background:none;border:none;color:#333;font-size:.82rem;font-weight:500;
                 cursor:pointer;padding:0;transition:color .15s;"
          onmouseover="this.style.color='#fff'" onmouseout="this.style.color='#333'">
          ↩
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</nav>

<div class="tr-page">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
