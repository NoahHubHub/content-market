<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{{ code }} – Content Market</title>
  <meta name="theme-color" content="#FFB162" />
  <style>
    :root {
      --bg: #1B2632; --surface: #243040; --text: #EEE9DF;
      --muted: #8A9BAD; --accent: #FFB162; --sell: #A35139;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background-image:
        radial-gradient(ellipse 90% 55% at 15% -5%, rgba(255,177,98,.07) 0%, transparent 60%),
        radial-gradient(ellipse 70% 50% at 85% 105%, rgba(163,81,57,.06) 0%, transparent 55%);
    }
    .wrap { max-width: 340px; width: 100%; text-align: center; }
    .code {
      font-size: 5rem; font-weight: 800; line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--sell));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 16px;
    }
    h1 { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
    p { font-size: .9rem; color: var(--muted); line-height: 1.55; margin-bottom: 32px; }
    .actions { display: flex; flex-direction: column; gap: 12px; }
    a.btn-primary {
      display: block; background: var(--accent); color: var(--bg);
      border-radius: 14px; padding: 15px 24px;
      font-size: .95rem; font-weight: 700; text-decoration: none;
      transition: opacity .15s;
    }
    a.btn-primary:active { opacity: .85; }
    a.btn-ghost {
      display: block; background: var(--surface); color: var(--text);
      border: 1px solid rgba(238,233,223,.15);
      border-radius: 14px; padding: 15px 24px;
      font-size: .95rem; font-weight: 600; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="code">{{ code }}</div>
    <h1>{{ title }}</h1>
    <p>{{ message }}</p>
    <div class="actions">
      <a href="/" class="btn-primary">Zurück zum Markt</a>
      {% if code == 404 %}
      <a href="/search" class="btn-ghost">🔍 Video suchen</a>
      {% endif %}
    </div>
  </div>
</body>
</html>
