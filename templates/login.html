{% extends "base.html" %}
{% block title %}Login — Content Market{% endblock %}
{% block content %}

<div style="max-width:360px;margin:60px auto 0;">
  <div style="margin-bottom:28px;">
    <div class="tr-label" style="margin-bottom:4px;">Content Market</div>
    <div class="tr-title">Anmelden</div>
  </div>

  {% if error %}
  <div class="tr-alert tr-alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/login">
    <div style="margin-bottom:14px;">
      <div class="tr-label" style="margin-bottom:6px;">Username</div>
      <input name="username" type="text" class="tr-input" required autofocus
             placeholder="Dein Username" />
    </div>
    <div style="margin-bottom:24px;">
      <div class="tr-label" style="margin-bottom:6px;">Passwort</div>
      <input name="password" type="password" class="tr-input" required
             placeholder="••••••••" />
    </div>
    <button type="submit" class="tr-btn-primary" style="width:100%;text-align:center;">
      Einloggen
    </button>
  </form>

  <div style="text-align:center;margin-top:20px;">
    <span class="tr-sub">Noch kein Account?</span>
    <a href="/register" style="color:#fff;font-weight:600;margin-left:6px;">Registrieren</a>
  </div>
</div>

{% endblock %}
