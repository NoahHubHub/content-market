<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kein Netz – Content Market</title>
  <meta name="theme-color" content="#FFB162" />
  <style>
    :root {
      --bg: #1B2632; --surface: #243040; --text: #EEE9DF;
      --muted: #8A9BAD; --accent: #FFB162;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .wrap {
      max-width: 340px; width: 100%; text-align: center;
    }
    .icon {
      font-size: 4rem; margin-bottom: 24px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    h1 {
      font-size: 1.4rem; font-weight: 700; margin-bottom: 10px; color: var(--text);
    }
    p {
      font-size: .9rem; color: var(--muted); line-height: 1.55; margin-bottom: 32px;
    }
    .pill {
      display: inline-block; background: rgba(255,177,98,.1);
      border: 1px solid rgba(255,177,98,.25); border-radius: 20px;
      padding: 4px 14px; font-size: .75rem; color: var(--accent);
      margin-bottom: 32px;
    }
    button {
      background: var(--accent); color: var(--bg); border: none;
      border-radius: 14px; padding: 15px 32px;
      font-size: .95rem; font-weight: 700; cursor: pointer; width: 100%;
      transition: opacity .15s, transform .1s;
    }
    button:active { transform: scale(.96); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon">📡</div>
    <div class="pill">Keine Verbindung</div>
    <h1>Markt nicht erreichbar</h1>
    <p>Dein Portfolio wartet auf dich. Verbinde dich wieder mit dem Internet, um weiter zu handeln.</p>
    <button onclick="location.reload()">Erneut versuchen</button>
  </div>
</body>
</html>
