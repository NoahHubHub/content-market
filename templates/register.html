{% extends "base.html" %}
{% block title %}Registrieren — Content Market{% endblock %}
{% block content %}

<div style="max-width:360px;margin:60px auto 0;">
  <div style="margin-bottom:28px;">
    <div class="tr-label" style="margin-bottom:4px;">Content Market</div>
    <div class="tr-title">Account erstellen</div>
    <div class="tr-sub" style="margin-top:6px;">Du startest mit $10.000 virtuellem Kapital.</div>
  </div>

  {% if error %}
  <div class="tr-alert tr-alert-error">{{ error }}</div>
  {% endif %}

  <form method="post" action="/register">
    <div style="margin-bottom:14px;">
      <div class="tr-label" style="margin-bottom:6px;">Username</div>
      <input name="username" type="text" class="tr-input" required autofocus
             placeholder="Mindestens 3 Zeichen" />
    </div>
    <div style="margin-bottom:24px;">
      <div class="tr-label" style="margin-bottom:6px;">Passwort</div>
      <input name="password" type="password" class="tr-input" required
             placeholder="••••••••" />
    </div>
    <button type="submit" class="tr-btn-primary" style="width:100%;text-align:center;">
      Account erstellen
    </button>
  </form>

  <div style="text-align:center;margin-top:20px;">
    <span class="tr-sub">Schon ein Account?</span>
    <a href="/login" style="color:#fff;font-weight:600;margin-left:6px;">Einloggen</a>
  </div>
</div>

{% endblock %}
