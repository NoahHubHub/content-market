{% extends "base.html" %}
{% block title %}Registrieren — Content Market{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-4">
    <div class="card p-4">
      <h4 class="mb-1 fw-bold">Account erstellen</h4>
      <p class="text-secondary mb-4">Du startest mit $10.000 virtuellem Kapital.</p>
      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}
      <form method="post" action="/register">
        <div class="mb-3">
          <label class="form-label text-secondary">Username</label>
          <input name="username" type="text" class="form-control" required autofocus />
        </div>
        <div class="mb-4">
          <label class="form-label text-secondary">Passwort</label>
          <input name="password" type="password" class="form-control" required />
        </div>
        <button type="submit" class="btn btn-buy w-100">Account erstellen</button>
      </form>
      <hr />
      <p class="text-center text-secondary mb-0">
        Schon ein Account? <a href="/login">Einloggen</a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
